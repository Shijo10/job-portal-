<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Jobs - JobConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/my-jobs.css">
    <link rel="stylesheet" href="/dark-mode.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-briefcase"></i>
                <span>JobConnect</span>
            </div>
            <div class="nav-right">
                <span class="customer-name">
                    <i class="fas fa-user-circle"></i>
                    <span id="customer-name">Customer</span>
                </span>
                <button id="logout-btn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <div>
                <h1><i class="fas fa-list-check"></i> My Posted Jobs</h1>
                <p>Manage and track all your job postings</p>
            </div>
            <button id="post-new-job-btn" class="btn-primary">
                <i class="fas fa-plus"></i> Post New Job
            </button>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #059669 0%, #14b8a6 100%);">
                    <i class="fas fa-briefcase"></i>
                </div>
                <div class="stat-info">
                    <h3 id="total-jobs">0</h3>
                    <p>Total Jobs</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);">
                    <i class="fas fa-folder-open"></i>
                </div>
                <div class="stat-info">
                    <h3 id="open-jobs">0</h3>
                    <p>Open Jobs</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);">
                    <i class="fas fa-spinner"></i>
                </div>
                <div class="stat-info">
                    <h3 id="in-progress-jobs">0</h3>
                    <p>In Progress</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #10b981 0%, #34d399 100%);">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-info">
                    <h3 id="completed-jobs">0</h3>
                    <p>Completed</p>
                </div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="tab-btn active" data-filter="all">
                <i class="fas fa-list"></i> All Jobs
            </button>
            <button class="tab-btn" data-filter="open">
                <i class="fas fa-folder-open"></i> Open
            </button>
            <button class="tab-btn" data-filter="assigned">
                <i class="fas fa-user-check"></i> Assigned
            </button>
            <button class="tab-btn" data-filter="in-progress">
                <i class="fas fa-spinner"></i> In Progress
            </button>
            <button class="tab-btn" data-filter="completed">
                <i class="fas fa-check-circle"></i> Completed
            </button>
            <button class="tab-btn" data-filter="cancelled">
                <i class="fas fa-times-circle"></i> Cancelled
            </button>
        </div>

        <!-- Jobs List -->
        <div id="jobs-container" class="jobs-grid">
            <!-- Jobs will be loaded here -->
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading your jobs...</p>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <i class="fas fa-briefcase"></i>
            <h3>No Jobs Found</h3>
            <p>You haven't posted any jobs yet. Start by posting your first job!</p>
            <button class="btn-primary" onclick="window.location.href='/post-job'">
                <i class="fas fa-plus"></i> Post Your First Job
            </button>
        </div>
    </div>

    <script src="/my-jobs.js"></script>
    <script src="/dark-mode.js"></script>
</body>
</html>

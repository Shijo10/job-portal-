<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - JobConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/chat.css">
    <link rel="stylesheet" href="/dark-mode.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='/'">
                <i class="fas fa-briefcase"></i>
                <span>JobConnect</span>
            </div>
            <button onclick="window.history.back()" class="btn-back">
                <i class="fas fa-arrow-left"></i> Back
            </button>
        </div>
    </nav>

    <!-- Chat Container -->
    <div class="chat-container">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="worker-info">
                <div class="worker-avatar" id="worker-avatar">W</div>
                <div>
                    <h3 id="worker-name">Worker Name</h3>
                    <span class="status-online">
                        <i class="fas fa-circle"></i> Online
                    </span>
                </div>
            </div>
            <div class="chat-actions">
                <button class="btn-icon" title="Voice Call">
                    <i class="fas fa-phone"></i>
                </button>
                <button class="btn-icon" title="Video Call">
                    <i class="fas fa-video"></i>
                </button>
                <button class="btn-icon" title="More Options">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
            </div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chat-messages">
            <!-- Welcome Message -->
            <div class="system-message">
                <i class="fas fa-info-circle"></i>
                <p>Start a conversation with <span id="worker-name-msg">the worker</span></p>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="chat-input-container">
            <button class="btn-icon" title="Attach File">
                <i class="fas fa-paperclip"></i>
            </button>
            <input 
                type="text" 
                id="message-input" 
                placeholder="Type your message..." 
                autocomplete="off"
            />
            <button class="btn-icon" title="Emoji">
                <i class="fas fa-smile"></i>
            </button>
            <button class="btn-send" id="send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Quick Actions Sidebar -->
    <div class="quick-actions">
        <h4><i class="fas fa-bolt"></i> Quick Actions</h4>
        <button class="quick-action-btn" onclick="sendQuickMessage('Hello! I am interested in hiring you for a job.')">
            <i class="fas fa-hand-wave"></i>
            Greeting
        </button>
        <button class="quick-action-btn" onclick="sendQuickMessage('What is your availability for this week?')">
            <i class="fas fa-calendar"></i>
            Ask Availability
        </button>
        <button class="quick-action-btn" onclick="sendQuickMessage('Can you share your previous work samples?')">
            <i class="fas fa-images"></i>
            Request Samples
        </button>
        <button class="quick-action-btn" onclick="sendQuickMessage('What are your rates for this type of work?')">
            <i class="fas fa-rupee-sign"></i>
            Ask Rates
        </button>
        <button class="quick-action-btn" onclick="window.location.href='/payment?workerId=' + new URLSearchParams(window.location.search).get('workerId') + '&workerName=' + new URLSearchParams(window.location.search).get('workerName')">
            <i class="fas fa-briefcase"></i>
            Hire Now
        </button>
    </div>

    <!-- AI Assistant Widget -->
    <script>
        fetch('/ai-assistant.html')
            .then(response => response.text())
            .then(html => {
                document.body.insertAdjacentHTML('beforeend', html);
            });
    </script>

    <script src="/chat-realtime.js"></script>
    <script src="/dark-mode.js"></script>
</body>
</html>

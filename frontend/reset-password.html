<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Job Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/customer-login.css">
    <link rel="stylesheet" href="/dark-mode.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-unlock-alt"></i>
                <h1>Reset Password</h1>
                <p>Enter the 6-digit OTP sent to your email</p>
            </div>

            <form id="resetPasswordForm" class="login-form">
                <div class="form-group">
                    <label for="otp">
                        <i class="fas fa-hashtag"></i>
                        6-Digit OTP
                    </label>
                    <input 
                        type="text" 
                        id="otp" 
                        name="otp" 
                        placeholder="Enter OTP"
                        maxlength="6"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="newPassword">
                        <i class="fas fa-lock"></i>
                        New Password
                    </label>
                    <input 
                        type="password" 
                        id="newPassword" 
                        name="newPassword" 
                        placeholder="Enter new password"
                        minlength="8"
                        required
                    >
                </div>

                <div id="error-message" class="error-message" style="display: none;"></div>
                <div id="success-message" class="success-message" style="display: none;"></div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-save"></i>
                    <span>Reset Password</span>
                </button>
            </form>

            <div class="login-footer">
                <p>Didn't receive an OTP?</p>
                <a href="/forgot-password" class="link-register">
                    Request Again
                </a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('email');

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otp').value;
            const newPassword = document.getElementById('newPassword').value;
            const btn = e.target.querySelector('button');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            if (!emailParam) {
                errorMessage.textContent = 'Email parameter missing. Please go back and request OTP again.';
                errorMessage.style.display = 'block';
                return;
            }

            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailParam, otp, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    successMessage.textContent = 'Password reset successfully! Redirecting...';
                    successMessage.style.display = 'block';
                    successMessage.classList.add('show');
                    setTimeout(() => {
                        window.location.href = '/customer-login';
                    }, 2000);
                } else {
                    errorMessage.textContent = data.error || 'Failed to reset password';
                    errorMessage.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-save"></i> <span>Reset Password</span>';
                }
            } catch (error) {
                errorMessage.textContent = 'An error occurred. Please try again later.';
                errorMessage.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> <span>Reset Password</span>';
            }
        });
    </script>
    <script src="/dark-mode.js"></script>
</body>
</html>

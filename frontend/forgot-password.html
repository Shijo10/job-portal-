<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Job Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/customer-login.css">
    <link rel="stylesheet" href="/dark-mode.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-key"></i>
                <h1>Forgot Password</h1>
                <p>Enter your email to receive a password reset OTP</p>
            </div>

            <form id="forgotPasswordForm" class="login-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your registered email"
                        required
                    >
                </div>

                <div id="error-message" class="error-message" style="display: none;"></div>
                <div id="success-message" class="success-message" style="display: none;"></div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-paper-plane"></i>
                    <span>Send Reset OTP</span>
                </button>
            </form>

            <div class="login-footer">
                <p>Remembered your password?</p>
                <a href="/customer-login" class="link-register">
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = e.target.querySelector('button');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`Your Password Reset OTP is: ${data.otp}\n\nPlease copy this 6-digit code or write it down. You will be redirected to the reset page when you click OK.`);
                    successMessage.textContent = 'OTP generated! Redirecting...';
                    successMessage.style.display = 'block';
                    successMessage.classList.add('show');
                    setTimeout(() => {
                        window.location.href = `/reset-password?email=${encodeURIComponent(email)}`;
                    }, 2000);
                } else {
                    errorMessage.textContent = data.error || 'Failed to send OTP';
                    errorMessage.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> <span>Send Reset OTP</span>';
                }
            } catch (error) {
                errorMessage.textContent = 'An error occurred. Please try again later.';
                errorMessage.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> <span>Send Reset OTP</span>';
            }
        });
    </script>
    <script src="/dark-mode.js"></script>
</body>
</html>
